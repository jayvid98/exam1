// ── STATE ──
const TABS = {
  exam1:  { q: EXAM1_Q,  state: {}, filter: 'All', filters: ['Metabolic Syndrome', 'Antilipemics & Cholesterol', 'Hypertension', 'Angina Pectoris', 'CAD & MI', 'Heart Failure', 'Dysrhythmias & ECG', 'Pharmacology', 'Inflammatory & Valvular', 'Loss & Grief', 'Patient Teaching'] },
  cooper: { q: COOPER_Q, state: {}, filter: 'All', filters: ['Anatomy & Physiology', 'Diagnostic Tests', 'Dysrhythmias & ECG', 'Angina & MI', 'Heart Failure', 'Inflammatory Disorders', 'Cardiomyopathy', 'Cardiac Transplant', 'Valvular Disease', 'Hypertension', 'Peripheral Vascular', 'Pharmacology', 'Patient Teaching'] }
};
let currentTab = 'exam1';

// ── TAB SWITCH ──
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  renderFilters();
  updateDashboard();
}

function renderFilters(){
  const t=TABS[currentTab];
  const fi=document.getElementById('filtersInner');
  fi.innerHTML='<span class="filter-label">Filter:</span>';
  const allBtn=document.createElement('button');
  allBtn.className='filter-btn'+(t.filter==='All'?' active':'');
  allBtn.textContent='All';
  allBtn.onclick=()=>setFilter('All');
  fi.appendChild(allBtn);
  t.filters.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(t.filter===cat?' active':'');
    btn.textContent=cat;
    btn.onclick=()=>setFilter(cat);
    fi.appendChild(btn);
  });
}

function setFilter(cat){
  TABS[currentTab].filter=cat;
  renderFilters();
  renderQuestions(currentTab);
  updateDashboard();
}

function getFiltered(tab){
  const t=TABS[tab];
  if(t.filter==='All') return t.q.map((_,i)=>i);
  return t.q.map((_,i)=>i).filter(i=>t.q[i].cat===t.filter);
}

// ── INIT ──
function initApp(){
  renderFilters();
  renderQuestions('exam1');
  renderQuestions('cooper');
  updateDashboard();
  updateTabCounts();
}

function updateTabCounts(){
  document.getElementById('tc-exam1').textContent=EXAM1_Q.length;
  document.getElementById('tc-cooper').textContent=COOPER_Q.length;
}

// ── RENDER ──
function renderQuestions(tab){
  const t=TABS[tab];
  const container=document.getElementById('qc-'+tab);
  container.innerHTML='';
  const filtered=getFiltered(tab);
  if(!filtered.length){container.innerHTML='<div style="text-align:center;padding:60px;color:var(--muted);font-family:sans-serif"><h3>No questions in this category</h3></div>';return;}
  
  filtered.forEach((qi,num)=>{
    const q=t.q[qi];
    const s=t.state[qi]||{};
    const letters=['A','B','C','D','E','F','G'];
    const isSATA=q.type==='sata';
    const isCooper=tab==='cooper';

    const card=document.createElement('div');
    card.className='q-card'+(s.submitted?(s.correct?' answered-correct':' answered-wrong'):'');
    card.id='card-'+tab+'-'+qi;

    const metaHtml=`<div class="q-meta">
      <span class="q-badge badge-num">#${num+1}</span>
      <span class="q-badge badge-cat">${q.cat}</span>
      ${isSATA?'<span class="q-badge badge-sata">SELECT ALL THAT APPLY</span>':''}
      ${q.img?'<span class="q-badge badge-img">📊 ECG STRIP</span>':''}
      ${isCooper?'<span class="q-badge badge-cooper">📖 Cooper TB</span>':''}
      <span class="badge-src">${q.src||''}</span>
    </div>`;

    const imgHtml=q.img?`<div class="q-image"><img src="${getImgSrc(q.img)}" alt="ECG strip"/><div class="img-caption">${getImgCap(q.img)}</div></div>`:'';

    // Guard against seq/fill questions that have no opts array
    const safeOpts = Array.isArray(q.opts) ? q.opts : [];
    const safeAns = Array.isArray(q.ans) ? q.ans : [];
    const optsHtml=`<div class="options" id="opts-${tab}-${qi}">${safeOpts.map((opt,oi)=>{
      let cls='opt-btn';
      if(s.submitted){
        if(safeAns.includes(oi))cls+=' reveal-correct';
        if(s.selected&&s.selected.includes(oi)&&!safeAns.includes(oi))cls+=' wrong';
      }else if(s.selected&&s.selected.includes(oi))cls+=' selected';
      return `<button class="${cls}" ${s.submitted?'disabled':''} onclick="toggleOpt('${tab}',${qi},${oi})"><span class="opt-letter">${letters[oi]}</span>${opt}</button>`;
    }).join('')}${safeOpts.length===0?'<div style="color:var(--muted);font-size:0.85rem;padding:8px;font-style:italic;">⚠️ This question type requires the full quiz view to display options.</div>':''}</div>`;

    const subBtn=s.submitted?'': `<button class="submit-btn" id="sub-${tab}-${qi}" onclick="submitQ('${tab}',${qi})" disabled>✓ Submit Answer</button>`;

    let ratHtml='';
    if(s.submitted){
      const safeA=Array.isArray(q.ans)?q.ans:[];const safeO=Array.isArray(q.opts)?q.opts:[];
  const correctTxt=safeA.map(i=>letters[i]+'. '+(safeO[i]||'see rationale')).join('; ');
      const wrongLine=!s.correct?`<div class="correct-answer-line">✓ Correct answer: ${correctTxt}</div>`:'';
      ratHtml=`<div class="rationale ${s.correct?'correct-rat':'wrong-rat'}" style="display:block">
        <div class="rat-label">${s.correct?'✓ Correct!':'✗ Incorrect'}</div>${wrongLine}${q.rat}
      </div>`;
    }

    card.innerHTML=metaHtml+`<div class="q-text">${q.q}</div>`+imgHtml+optsHtml+subBtn+ratHtml;
    
    // Staggered animation delay
    card.style.animationDelay=(num*0.04)+'s';
    container.appendChild(card);

    if(!s.submitted&&s.selected&&s.selected.length>0){
      const sub=document.getElementById('sub-'+tab+'-'+qi);
      if(sub)sub.disabled=false;
    }
  });
  checkAllDone(tab);
}

function toggleOpt(tab,qi,oi){
  const t=TABS[tab];
  const s=t.state[qi]||{selected:[]};
  if(s.submitted)return;
  if(!Array.isArray(t.q[qi].opts)||t.q[qi].opts.length===0)return;
  if(!s.selected)s.selected=[];
  const q=t.q[qi];
  if(q.type==='sata'){const idx=s.selected.indexOf(oi);idx===-1?s.selected.push(oi):s.selected.splice(idx,1);}
  else{s.selected=[oi];}
  t.state[qi]=s;
  document.querySelectorAll('#opts-'+tab+'-'+qi+' .opt-btn').forEach((btn,bi)=>btn.classList.toggle('selected',s.selected.includes(bi)));
  const sub=document.getElementById('sub-'+tab+'-'+qi);
  if(sub)sub.disabled=s.selected.length===0;
}

function submitQ(tab,qi){
  const t=TABS[tab];
  const q=t.q[qi];
  const s=t.state[qi]||{};
  const sel=[...(s.selected||[])].sort();
  const ans=[...(Array.isArray(q.ans)?q.ans:[])].sort();
  const correct=JSON.stringify(sel)===JSON.stringify(ans);
  s.submitted=true; s.correct=correct; t.state[qi]=s;

  const card=document.getElementById('card-'+tab+'-'+qi);
  card.classList.remove('answered-correct','answered-wrong','just-correct','just-wrong');
  void card.offsetWidth;
  card.classList.add(correct?'answered-correct':'answered-wrong', correct?'just-correct':'just-wrong');

  const btns=card.querySelectorAll('.opt-btn');
  btns.forEach((btn,bi)=>{
    btn.disabled=true; btn.classList.remove('selected');
    if(q.ans.includes(bi))btn.classList.add('reveal-correct');
    if(s.selected&&s.selected.includes(bi)&&!q.ans.includes(bi))btn.classList.add('wrong');
  });

  const sub=document.getElementById('sub-'+tab+'-'+qi);
  if(sub)sub.remove();

  const letters=['A','B','C','D','E','F','G'];
  const safeA=Array.isArray(q.ans)?q.ans:[];const safeO=Array.isArray(q.opts)?q.opts:[];
  const correctTxt=safeA.map(i=>letters[i]+'. '+(safeO[i]||'see rationale')).join('; ');
  const wrongLine=!correct?`<div class="correct-answer-line">✓ Correct answer: ${correctTxt}</div>`:'';
  const ratDiv=document.createElement('div');
  ratDiv.className='rationale '+(correct?'correct-rat':'wrong-rat');
  ratDiv.style.display='block';
  ratDiv.innerHTML=`<div class="rat-label">${correct?'✓ Correct!':'✗ Incorrect'}</div>${wrongLine}${q.rat}`;
  card.appendChild(ratDiv);

  updateDashboard();
  checkAllDone(tab);
}

function updateDashboard(){
  const tab=currentTab;
  const filtered=getFiltered(tab);
  const t=TABS[tab];
  const answered=filtered.filter(i=>t.state[i]&&t.state[i].submitted);
  const correct=answered.filter(i=>t.state[i].correct);
  const pct=answered.length>0?Math.round(correct.length/answered.length*100):0;
  document.getElementById('scoreVal').textContent=pct+'%';
  document.getElementById('correctVal').textContent=correct.length;
  document.getElementById('wrongVal').textContent=answered.length-correct.length;
  document.getElementById('remainVal').textContent=filtered.length-answered.length;
  const prog=filtered.length>0?(answered.length/filtered.length*100):0;
  document.getElementById('progressBar').style.width=prog+'%';
  document.getElementById('progressLabel').textContent=answered.length+' of '+filtered.length+' answered';
}

function checkAllDone(tab){
  const filtered=getFiltered(tab);
  const t=TABS[tab];
  const answered=filtered.filter(i=>t.state[i]&&t.state[i].submitted);
  const banner=document.getElementById('results-'+tab);
  if(answered.length===filtered.length&&filtered.length>0){
    const correct=answered.filter(i=>t.state[i].correct);
    const pct=Math.round(correct.length/filtered.length*100);
    const pctEl=document.getElementById('pct-'+tab);
    pctEl.textContent=pct+'%';
    pctEl.className='results-pct '+(pct>=80?'pct-a':pct>=65?'pct-b':'pct-c');
    const stars=pct>=90?'⭐⭐⭐':pct>=80?'⭐⭐':'⭐';
    document.getElementById('stars-'+tab).textContent=stars;
    document.getElementById('msg-'+tab).textContent=correct.length+'/'+filtered.length+' correct — '+(pct>=90?'🏆 Outstanding! You are exam-ready!':pct>=80?'🎉 Great work! Review the ones you missed.':pct>=65?'👍 Good effort! Study your rationales.':'📚 Keep going — review your notes and retry.');
    banner.style.display='block';
    if(pct>=80)launchConfetti();
    banner.scrollIntoView({behavior:'smooth',block:'start'});
  }else{
    banner.style.display='none';
  }
}

function restartTab(tab){
  const filtered=getFiltered(tab);
  filtered.forEach(i=>{delete TABS[tab].state[i];});
  renderQuestions(tab);
  updateDashboard();
  document.querySelector('.quiz-area').scrollIntoView({behavior:'smooth'});
}

// ── PARTICLES ──
function initParticles(){
  const c=document.getElementById('particles');
  const colors=['#e8c4aa','#f9d5c0','#fde8d8','#f4c5a8','#fbd0b8','#e8b090','#f0d4c0'];
  const emojis=['♥','✚','💊','🩺','♦'];
  for(let i=0;i<20;i++){
    const p=document.createElement('div');
    p.className='particle';
    const isEmoji=Math.random()>0.6;
    if(isEmoji){p.textContent=emojis[Math.floor(Math.random()*emojis.length)];p.style.fontSize=Math.random()*12+8+'px';}
    else{const size=Math.random()*8+4;p.style.width=size+'px';p.style.height=size+'px';p.style.background=colors[Math.floor(Math.random()*colors.length)];}
    p.style.setProperty('--dur',(Math.random()*12+8)+'s');
    p.style.setProperty('--delay',(Math.random()*10)+'s');
    p.style.setProperty('--op',(Math.random()*0.25+0.05).toFixed(2));
    p.style.left=Math.random()*100+'%';
    c.appendChild(p);
  }
}

// ── CONFETTI ──
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const pieces=[];
  const colors=['#c0392b','#e8a87c','#f4c5a8','#27ae60','#e67e22','#d4856a','#fde8d8'];
  for(let i=0;i<120;i++){
    pieces.push({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height-canvas.height,
      size:Math.random()*8+4, color:colors[Math.floor(Math.random()*colors.length)],
      speed:Math.random()*3+2, angle:Math.random()*360, spin:Math.random()*4-2,
      opacity:1
    });
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle*Math.PI/180);
      ctx.globalAlpha=p.opacity; ctx.fillStyle=p.color;
      ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
      ctx.restore();
      p.y+=p.speed; p.angle+=p.spin; p.opacity-=0.006;
    });
    frame++;
    if(frame<180)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}
