const EXAM1_Q=[// ============================================================
// METABOLIC SYNDROME
// ============================================================
{cat:'Metabolic Syndrome',type:'mc',
q:'Which approach is the MOST CRITICAL when treating metabolic syndrome?',
opts:['Pharmacologic therapy alone','Lifestyle management','Surgical intervention','Hormone replacement therapy'],
ans:[1],
rat:'Lifestyle management is the cornerstone and most critical approach to treating metabolic syndrome. This includes diet modification, regular physical activity, weight reduction, smoking cessation, and stress reduction. Drug therapy is added only when lifestyle changes are insufficient.',
src:'Exam 1 Term 3 Flashcards'},

{cat:'Metabolic Syndrome',type:'mc',
q:'Which instruction by the nurse is accurate to include in a patient\'s care plan to manage metabolic syndrome?',
opts:['Take medications around the clock','Reduce stress','Increase sodium intake for energy','Limit fluid intake to 500 mL daily'],
ans:[1],
rat:'Stress reduction is a key lifestyle intervention for metabolic syndrome. Stress triggers catecholamine release, which raises blood pressure, blood glucose, and promotes abdominal fat accumulation. Effective stress management (relaxation techniques, exercise, adequate sleep) helps control all components of metabolic syndrome.',
src:'Exam 1 Term 3'},

{cat:'Metabolic Syndrome',type:'sata',
q:'Which lifestyle choice(s) may AGGRAVATE metabolic syndrome? (Select all that apply)',
opts:['Excessive consumption of alcohol','Inadequate caloric intake (starvation dieting)','Excessive tobacco smoking','Regular moderate exercise','High-fiber diet'],
ans:[0,1,2],
rat:'Excessive alcohol raises triglycerides and blood pressure. Excessive tobacco smoking causes vasoconstriction, insulin resistance, and dyslipidemia. Inadequate caloric intake (crash dieting) can trigger metabolic stress and worsen insulin resistance. Regular exercise and high-fiber diets are BENEFICIAL for metabolic syndrome — not aggravating factors.',
src:'Exam 1 Term 3'},

{cat:'Metabolic Syndrome',type:'sata',
q:'Which conditions are the TARGETS for drug therapy to control during the initial treatment of metabolic syndrome? (Select all that apply)',
opts:['Diabetes mellitus','Hypertension','Dyslipidemia','Anemia','Osteoporosis'],
ans:[0,1,2],
rat:'The three primary drug therapy targets in metabolic syndrome are: (1) Diabetes mellitus/hyperglycemia (glucose control), (2) Hypertension (BP control), and (3) Dyslipidemia (lipid management). These are the conditions causing the cardiovascular risk. Anemia and osteoporosis are not components of metabolic syndrome.',
src:'Exam 1 Term 3'},

{cat:'Metabolic Syndrome',type:'mc',
q:'Which actions should education for children in primary grades focus on to help PREVENT metabolic syndrome?',
opts:['Teaching them to count calories precisely','Prevention of smoking, importance of moderate activity, and discouraging alcohol use','Prescribing low-dose statins early','Starting weight loss medications at puberty'],
ans:[1],
rat:'Primary prevention of metabolic syndrome in children focuses on healthy lifestyle habits: preventing tobacco use (smoking causes insulin resistance and vasoconstriction), encouraging moderate physical activity (prevents obesity, improves insulin sensitivity), and discouraging alcohol use. Early lifestyle education is the most effective prevention strategy.',
src:'Exam 1 Term 3'},

{cat:'Metabolic Syndrome',type:'mc',
q:'A patient weighs 140 lbs and is 5 feet 4 inches tall. What is their BMI?',
opts:['18.5','21.2','24.03','28.7'],
ans:[2],
rat:'BMI = weight (kg) ÷ height (m)². 140 lbs ÷ 2.2 = 63.6 kg. 5\'4\" = 64 inches × 0.0254 = 1.626 m. 1.626² = 2.644. BMI = 63.6 ÷ 2.644 = 24.03. This is within normal range (18.5–24.9). Overweight = 25–29.9; Obese = ≥30.',
src:'Exam 1 Term 3'},

// ============================================================
// ANTILIPEMICS & CHOLESTEROL
// ============================================================
{cat:'Antilipemics & Cholesterol',type:'mc',
q:'Which lipoprotein contributes MOST to the development of atherosclerosis?',
opts:['High-density lipoprotein (HDL)','Very low-density lipoprotein (VLDL)','Low-density lipoprotein (LDL)','Chylomicrons'],
ans:[2],
rat:'LDL (low-density lipoprotein) is the primary contributor to atherosclerosis. LDL deposits cholesterol into arterial walls, forming plaques. HDL is protective ("good" cholesterol — transports cholesterol from vessels to liver). Elevated LDL + low HDL = highest cardiovascular risk.',
src:'Exam 1 Term 3'},

{cat:'Antilipemics & Cholesterol',type:'mc',
q:'Which time period identifies the BEST time for the nurse to administer lovastatin?',
opts:['Early morning with breakfast','At noon with lunch','During the patient\'s dinner','At bedtime'],
ans:[2],
rat:'Lovastatin (unlike other statins) should be taken WITH the EVENING MEAL (dinner). Food increases its bioavailability by 50%. Most statins work by inhibiting HMG-CoA reductase — cholesterol production peaks at night, so evening/bedtime dosing is most effective for statins taken without food (e.g., rosuvastatin, pravastatin).',
src:'Exam 1 Term 3'},

{cat:'Antilipemics & Cholesterol',type:'mc',
q:'Which deficiency may develop in patients taking cholestyramine (a bile acid resin)?',
opts:['Vitamin C deficiency','Vitamin D deficiency','Vitamin K deficiency','Iron deficiency'],
ans:[2],
rat:'Bile acid resins (cholestyramine, colestipol) bind bile acids in the intestine and also interfere with absorption of fat-soluble vitamins (A, D, E, K). Vitamin K deficiency is the most clinically significant — it impairs clotting factor synthesis and can lead to bleeding complications. Other drugs should be taken 1 hour before or 4–6 hours after the resin.',
src:'Exam 1 Term 3'},

{cat:'Antilipemics & Cholesterol',type:'mc',
q:'Which possible adverse reaction related to vitamin K deficiency should a patient prescribed a bile acid resin be instructed to report?',
opts:['Bright red urine','Coffee-ground emesis','Severe headache','Muscle cramps'],
ans:[1],
rat:'Coffee-ground emesis (vomiting that looks like coffee grounds) indicates upper GI bleeding — a sign of significant vitamin K deficiency causing impaired coagulation. Bile acid resins reduce fat-soluble vitamin K absorption, increasing bleeding risk. Patients should also report unusual bruising, gum bleeding, or black tarry stools.',
src:'Exam 1 Term 3'},

{cat:'Antilipemics & Cholesterol',type:'mc',
q:'Which vitamin has antilipemic (cholesterol-lowering) actions?',
opts:['Vitamin A','Vitamin C','Vitamin B3 (Niacin)','Vitamin E'],
ans:[2],
rat:'Vitamin B3 (Niacin/Nicotinic acid) is the only vitamin with significant antilipemic properties. It inhibits VLDL synthesis in the liver, lowering triglycerides and LDL while raising HDL. Common side effects: flushing (take aspirin 30 min before to reduce). Serious effects: hepatotoxicity, myopathy.',
src:'Exam 1 Term 3'},

{cat:'Antilipemics & Cholesterol',type:'mc',
q:'Which rationale explains why statins (HMG-CoA reductase inhibitors) are administered at NIGHT?',
opts:['To prevent nausea during the day','To improve patient compliance','Cholesterol production peaks at night','To enhance absorption with sleep'],
ans:[2],
rat:'Cholesterol biosynthesis (production) peaks at night — specifically during the early hours of the morning. Since statins block HMG-CoA reductase (the rate-limiting enzyme in cholesterol synthesis), administering them at night/bedtime maximizes their effectiveness by inhibiting peak production. Note: lovastatin is taken with dinner, pravastatin/rosuvastatin anytime.',
src:'Exam 1 Term 3'},

{cat:'Antilipemics & Cholesterol',type:'mc',
q:'Which desired effect applies to antilipemic therapy?',
opts:['Increased LDL and total cholesterol','Reduced LDL and total cholesterol levels','Reduced HDL levels','Increased triglyceride levels'],
ans:[1],
rat:'The goal of antilipemic therapy is to reduce LDL ("bad" cholesterol) and total cholesterol. Target LDL varies by risk: <100 mg/dL for high-risk patients (CAD, DM), <70 mg/dL for very high-risk. HDL should INCREASE (protective). Triglycerides should also decrease.',
src:'Exam 1 Term 3'},

{cat:'Antilipemics & Cholesterol',type:'mc',
q:'Which antilipemic agent is the MOST POTENT?',
opts:['Bile acid–binding resins','Niacin (Vitamin B3)','HMG-CoA reductase inhibitors (Statins)','Omega-3 fatty acids'],
ans:[2],
rat:'HMG-CoA reductase inhibitors (statins: atorvastatin, rosuvastatin, simvastatin) are the most potent antilipemic agents available. They reduce LDL by 30–60%, lower triglycerides, and modestly raise HDL. High-intensity statins (atorvastatin 40–80mg, rosuvastatin 20–40mg) can reduce LDL by >50%.',
src:'Exam 1 Term 3'},

{cat:'Antilipemics & Cholesterol',type:'mc',
q:'Which statement by the patient indicates a NEED FOR FURTHER TEACHING regarding statin therapy?',
opts:['"I will avoid grapefruit juice while taking this medication."','"If I get a headache I will notify the health care provider."','"I will report any muscle pain or weakness immediately."','"I understand I need liver function tests periodically."'],
ans:[1],
rat:'A headache is NOT a concerning side effect of statins that requires immediate provider notification. The critical side effects to report are: muscle aches/weakness (myopathy → rhabdomyolysis risk), unusual fatigue, dark urine (myoglobinuria), and signs of liver dysfunction (jaundice, RUQ pain). This patient\'s statement about headaches shows a misunderstanding of what to monitor.',
src:'Exam 1 Term 3'},

{cat:'Antilipemics & Cholesterol',type:'sata',
q:'Which important teaching points should be included in an educational plan on NIACIN prescribed to treat hyperlipidemia? (Select all that apply)',
opts:['Effectiveness of niacin in lowering total cholesterol','Take niacin on an empty stomach for best absorption','Information on high-cholesterol foods and food preparation using unsaturated fats','Do not report side effects unless severe','Adverse effects to report: fatigue, anorexia, nausea, malaise, jaundice, muscle aches'],
ans:[0,2,4],
rat:'Niacin teaching: (1) Explain its effectiveness in lowering total cholesterol and raising HDL. (2) Teach about heart-healthy diet (low cholesterol, unsaturated fats). (3) Report serious adverse effects: fatigue, anorexia, nausea, malaise, jaundice (hepatotoxicity), muscle aches (myopathy). Niacin should be taken WITH food to reduce GI upset. All side effects should be reported.',
src:'Exam 1 Term 3'},

{cat:'Antilipemics & Cholesterol',type:'sata',
q:'Which foods should be AVOIDED by a patient with hyperlipidemia? (Select all that apply)',
opts:['Hard cheese','Liver','Fresh fruits','Whole grains','Oily fish (salmon, mackerel)'],
ans:[0,1],
rat:'Hard cheese is high in saturated fat and cholesterol — raises LDL. Liver is extremely high in dietary cholesterol (~370mg per 3oz serving). Foods to avoid: organ meats (liver, kidney), hard cheeses, egg yolks, full-fat dairy, fried foods, fatty meats. Foods to encourage: fruits, vegetables, whole grains, oily fish (omega-3s lower triglycerides).',
src:'Exam 1 Term 3'},

{cat:'Antilipemics & Cholesterol',type:'sata',
q:'Which information will the nurse review when teaching a patient about therapy with STATINS? (Select all that apply)',
opts:['Statins are the most potent antilipemic agents available','Statins should never be taken with food','Statins cause mild increases in HDL levels','Statins reduce inflammation, platelet aggregation, and plasma viscosity','Statins are only for patients over age 65'],
ans:[0,2,3],
rat:'Statin teaching: (1) Statins ARE the most potent antilipemics. (2) Statins DO cause mild HDL increases. (3) Statins have pleiotropic (additional) effects: anti-inflammatory, antiplatelet, and reduce plasma viscosity — all cardioprotective. Most statins can be taken with or without food (lovastatin with dinner). Age is not a restriction — statins are used across age groups for high-risk patients.',
src:'Exam 1 Term 3'},

// ============================================================
// HYPERTENSION
// ============================================================
{cat:'Hypertension',type:'mc',
q:'Which nursing assessment confirms that an angiotensin II receptor blocker (ARB) that a patient is taking is EFFECTIVE?',
opts:['Heart rate has decreased to 55 bpm','Blood pressure has decreased','Urinary output has increased','Respiratory rate is 18'],
ans:[1],
rat:'ARBs (losartan, valsartan, olmesartan) block angiotensin II receptors, preventing vasoconstriction — the primary effect is decreased blood pressure. A decrease in BP confirms therapeutic effectiveness. ARBs are often used when patients cannot tolerate ACE inhibitor side effects (dry cough). They do NOT significantly affect HR alone.',
src:'Exam 1 Term 3'},

{cat:'Hypertension',type:'mc',
q:'Which rationale explains how propranolol (Inderal) controls hypertension?',
opts:['Increases renal sodium excretion','Dilates peripheral arteries directly','Reduces sympathetic stimulation in cardiac muscle','Blocks calcium channels in blood vessels'],
ans:[2],
rat:'Propranolol (a non-selective beta-blocker) reduces blood pressure by: blocking beta-1 receptors in the heart → decreasing heart rate and contractility → reducing cardiac output. It also blocks beta-1 receptors in the kidney → decreasing renin release → less angiotensin II and aldosterone → lower BP. It reduces sympathetic (norepinephrine/epinephrine) stimulation.',
src:'Exam 1 Term 3'},

{cat:'Hypertension',type:'mc',
q:'Which symptom is avoided when a patient is aware NOT to suddenly discontinue beta-adrenergic blockers?',
opts:['Severe hypotension','Increased angina and risk of MI','Respiratory failure','Renal shutdown'],
ans:[1],
rat:'Abrupt discontinuation of beta-blockers causes REBOUND HYPERTENSION and INCREASED ANGINA (and potentially MI). The heart has upregulated beta receptors during therapy; sudden withdrawal causes excessive catecholamine stimulation. Always taper beta-blockers over 1–2 weeks. This is especially critical for patients with CAD.',
src:'Exam 1 Term 3'},

{cat:'Hypertension',type:'mc',
q:'Which agents are preferred for the INITIAL treatment of hypertension?',
opts:['ACE inhibitors and ARBs','Thiazide diuretics and beta-adrenergic blockers','Calcium channel blockers and alpha-blockers','Loop diuretics and direct vasodilators'],
ans:[1],
rat:'JNC guidelines identify thiazide diuretics (hydrochlorothiazide, chlorthalidone) as first-line for most patients with uncomplicated hypertension due to proven cardiovascular outcome benefits. Beta-adrenergic blockers are also preferred agents, particularly in patients with CAD, post-MI, or heart failure. ACE inhibitors/ARBs are preferred in DM or CKD.',
src:'Exam 1 Term 3'},

{cat:'Hypertension',type:'mc',
q:'Which statement accurately describes the action of ACE inhibitors?',
opts:['They increase renin production','They inhibit vasoconstriction by blocking angiotensin II formation','They directly dilate veins only','They block beta receptors in the heart'],
ans:[1],
rat:'ACE inhibitors (lisinopril, enalapril, captopril) block ACE enzyme → prevent conversion of angiotensin I → angiotensin II → no vasoconstriction → reduced peripheral resistance → lower BP. They also reduce aldosterone (less sodium/water retention) and reduce cardiac remodeling in HF. Side effect: dry persistent cough (bradykinin accumulation).',
src:'Exam 1 Term 3'},

{cat:'Hypertension',type:'sata',
q:'The nurse is finished conducting nutritional education about the DASH diet. Which foods offered for breakfast would be MOST APPROPRIATE for the patient to choose? (Select all that apply)',
opts:['Oatmeal','Orange juice','Grapefruit','Bacon and eggs','Whole milk with sugar'],
ans:[0,1,2],
rat:'DASH (Dietary Approaches to Stop Hypertension) diet emphasizes: whole grains (oatmeal), fruits (orange juice, grapefruit — also high in potassium which lowers BP), vegetables, low-fat dairy, lean proteins, and low sodium (<2,300 mg/day; ideally 1,500 mg). Avoid: high-fat meats (bacon), high-sodium foods, full-fat dairy, added sugars.',
src:'Exam 1 Term 3'},

{cat:'Hypertension',type:'sata',
q:'Which statements about diuretics are TRUE? (Select all that apply)',
opts:['A mechanism of action for antihypertensive effects includes volume depletion','Diuretics increase potassium levels in the body','Electrolytes must be evaluated periodically for patients on loop diuretics','They have been shown to reduce cardiovascular morbidity associated with hypertension','Loop diuretics are preferred for mild HTN in otherwise healthy patients'],
ans:[0,2,3],
rat:'True: (A) Diuretics reduce blood volume (volume depletion) → less preload → lower BP. (C) Loop diuretics cause electrolyte losses (K+, Mg2+, Na+) — monitor periodically. (D) Thiazide diuretics have demonstrated reduction in cardiovascular morbidity/mortality. Loop diuretics LOWER potassium (cause hypokalemia). Loop diuretics are used for edema/HF, not mild uncomplicated HTN.',
src:'Exam 1 Term 3'},

{cat:'Hypertension',type:'sata',
q:'When reassessing a patient for hypertension (two prior readings of 160/100), the nurse will: (Select all that apply)',
opts:['Choose a cuff encircling at least 80% of the arm','Use the smallest cuff available','Support patient\'s arm at heart level','Encourage patient to sit quietly for 5 minutes before assessing BP','Ask patient to drink coffee beforehand to get an accurate reading'],
ans:[0,2,3],
rat:'Correct BP assessment technique: (A) Cuff must encircle ≥80% of arm — too small = falsely high reading. (C) Arm supported at heart level — below heart = falsely high, above = falsely low. (D) Sit quietly 5 minutes — activity/anxiety elevates BP. Also: no caffeine, tobacco, or exercise 30 min before; use same arm each time; take 2 readings 1–2 min apart.',
src:'Exam 1 Term 3'},

{cat:'Hypertension',type:'mc',
q:'A patient is admitted with BP of 142/84 in left arm, 138/80 in right arm, temp 98.8°F, and radial pulse of 80 that is weak and IRREGULAR. Which assessment information warrants PHYSICIAN NOTIFICATION?',
opts:['Blood pressure only','Temperature only','Pulse only','All findings'],
ans:[2],
rat:'The PULSE is the concerning finding — it is weak and IRREGULAR. An irregular pulse may indicate atrial fibrillation, frequent PVCs, or another dysrhythmia requiring evaluation. The slight BP difference between arms (4 mmHg) is within normal variation. Temperature 98.8°F is normal. An irregular pulse requires immediate notification and likely a 12-lead ECG.',
src:'Exam 1 Term 3'},

{cat:'Hypertension',type:'mc',
q:'A patient with hypertension has a BP of 180/102 and states he only takes his medications "when he feels sick." Which response by the nurse is MOST APPROPRIATE?',
opts:['"You can take medications when needed — that\'s fine for mild HTN."','"It is important to take your medications daily to achieve optimal results, as hypertension is usually symptomless."','"You should double your dose when you feel your BP is high."','"This is your choice to make."'],
ans:[1],
rat:'Hypertension is the "silent killer" — it is largely asymptomatic until end-organ damage occurs. Medications must be taken DAILY (not PRN) to maintain consistent therapeutic blood levels and BP control. Non-adherence is a leading cause of hypertensive emergencies. Educate about the need for consistent daily dosing and regular BP monitoring.',
src:'Classroom Notes'},

{cat:'Hypertension',type:'mc',
q:'Which action would the nurse take after obtaining a blood pressure reading of 150/92 for a client in a hypertension screening clinic?',
opts:['Immediately call an ambulance','Reassess the BP in 5 minutes','Start antihypertensive medications','Document and discharge the patient'],
ans:[1],
rat:'A single elevated BP reading in a screening setting does not confirm hypertension. The correct action is to reassess in 5 minutes (or on a separate occasion) before making clinical decisions. HTN is confirmed with two or more elevated readings on two separate occasions. Also verify correct technique, cuff size, and that the patient has been resting quietly.',
src:'Classroom Notes'},

// ============================================================
// ANGINA PECTORIS
// ============================================================
{cat:'Angina Pectoris',type:'mc',
q:'Which cardiovascular conditions are related to coronary artery disease (CAD)? (Select all that apply)',
opts:['Angina pectoris','Acute myocardial infarction','Pulmonary embolism','Peripheral arterial disease','Pericarditis'],
ans:[0,1],
rat:'Angina pectoris (chest pain from myocardial ischemia) and acute MI (myocardial infarction from complete coronary occlusion) are the two primary conditions caused by CAD. Both result from atherosclerotic narrowing of coronary arteries. Pulmonary embolism and pericarditis are not caused by CAD. Peripheral arterial disease shares risk factors but is a separate condition.',
src:'Exam 1 Term 3'},

{cat:'Angina Pectoris',type:'mc',
q:'A 45-year-old male patient is diagnosed with stable angina. He is likely to tell the nurse that his chest pain is relieved by:',
opts:['Lying flat and breathing deeply','Rest and nitroglycerin','Aspirin alone','Heating pad over the chest'],
ans:[1],
rat:'Stable angina is predictably triggered by exertion/stress and RELIEVED by rest (reduces oxygen demand) and nitroglycerin (causes coronary vasodilation → increases blood flow to myocardium). If chest pain is not relieved by 3 doses of NTG SL 5 minutes apart, the patient should call 911 — this may indicate MI.',
src:'Exam 1 Term 3'},

{cat:'Angina Pectoris',type:'mc',
q:'Which medication combinations may be BENEFICIAL in treating angina pectoris?',
opts:['Diuretics and antacids','ACE inhibitors and statins','Antibiotics and NSAIDs','Antihistamines and decongestants'],
ans:[1],
rat:'ACE inhibitors reduce cardiac workload (decrease afterload and preload) and prevent cardiac remodeling. Statins stabilize atherosclerotic plaques, reduce inflammation, and lower LDL — addressing the underlying CAD. Together they reduce angina episodes and prevent MI. Additional angina treatments include nitrates, beta-blockers, and calcium channel blockers.',
src:'Exam 1 Term 3'},

{cat:'Angina Pectoris',type:'mc',
q:'What will the nurse advise the patient to do to AVOID the development of TOLERANCE to nitroglycerin?',
opts:['Take nitroglycerin with food to slow absorption','Allow for a daily 8–12 hour nitrate-free period','Take a double dose every other day','Use nitroglycerin only at night'],
ans:[1],
rat:'Nitrate tolerance develops rapidly with continuous nitrate exposure. To prevent tolerance: maintain an 8–12 hour nitrate-free period daily (usually overnight for patches — remove at bedtime, reapply in the morning). This allows receptor "re-sensitization." Sublingual NTG used PRN is less prone to tolerance than continuous-release forms.',
src:'Exam 1 Term 3'},

{cat:'Angina Pectoris',type:'mc',
q:'Which statement is TRUE regarding the pain associated with angina?',
opts:['It is always crushing and identical each episode','It is highly variable in intensity and location','It always radiates to the left arm only','It is unaffected by rest or nitroglycerin'],
ans:[1],
rat:'Angina pain is highly variable — it can range from mild pressure to severe crushing pain, and location varies (substernal, jaw, shoulder, left arm, back). Each patient\'s angina may feel different. Women and diabetics often have atypical presentations (fatigue, dyspnea, indigestion). This variability makes patient education about their specific pattern important.',
src:'Exam 1 Term 3'},

{cat:'Angina Pectoris',type:'mc',
q:'How do beta-adrenergic blocking agents reduce myocardial OXYGEN DEMAND?',
opts:['By increasing heart rate and force of contraction','By inhibiting the stimulation of norepinephrine and epinephrine','By dilating coronary arteries directly','By reducing preload through diuresis'],
ans:[1],
rat:'Beta-blockers reduce myocardial oxygen demand by BLOCKING the effects of norepinephrine and epinephrine (catecholamines) on the heart. This decreases heart rate (negative chronotropy) and force of contraction (negative inotropy) → reduced myocardial oxygen consumption → less ischemia and angina. They are a cornerstone of CAD and angina management.',
src:'Exam 1 Term 3'},

{cat:'Angina Pectoris',type:'mc',
q:'The nurse is teaching a patient about nitroglycerin prior to discharge. Which instruction will the nurse provide?',
opts:['Store nitroglycerin in a pill organizer in the bathroom','Carry the medication with you at all times','Take it only when pain becomes severe (8–10/10)','Refrigerate nitroglycerin to preserve potency'],
ans:[1],
rat:'NTG must be carried at ALL TIMES — angina is unpredictable and delays in treatment can cause myocardial damage. Additional teaching: store in original dark glass bottle (light degrades NTG), keep away from heat/moisture, replace every 3–6 months, take at first sign of chest pain (not when pain is severe), and do not refrigerate.',
src:'Exam 1 Term 3'},

{cat:'Angina Pectoris',type:'mc',
q:'What is the rationale behind administering calcium channel blockers to patients with angina?',
opts:['They increase heart rate and oxygen demand','They dilate blood vessels (coronary and peripheral)','They reduce sodium reabsorption in the kidney','They block platelet aggregation'],
ans:[1],
rat:'Calcium channel blockers (amlodipine, diltiazem, verapamil) relax vascular smooth muscle by blocking calcium entry → coronary and peripheral vasodilation → increased blood flow to myocardium + reduced afterload → less angina. They are especially useful for Prinzmetal\'s (vasospastic) angina and patients who cannot take beta-blockers.',
src:'Exam 1 Term 3'},

{cat:'Angina Pectoris',type:'mc',
q:'Which response will the nurse provide when a patient complains of a HEADACHE when using sublingual nitroglycerin?',
opts:['Stop NTG immediately — this indicates an allergic reaction','This is a common adverse effect that can be managed with acetaminophen','Call 911 — this is a sign of stroke','Reduce the dose of NTG by half'],
ans:[1],
rat:'Headache is the MOST COMMON side effect of nitroglycerin — caused by vasodilation of cerebral blood vessels. It is expected and usually mild to moderate. Patients should be reassured that it is benign and can be treated with acetaminophen (NOT aspirin or NSAIDs, which may interact). The headache typically diminishes with continued therapy as the body adapts.',
src:'Exam 1 Term 3'},

{cat:'Angina Pectoris',type:'sata',
q:'Which therapy(ies) is/are used in the treatment of angina pectoris? (Select all that apply)',
opts:['Use of nitrates','Coronary angioplasty (PCI)','Coronary artery bypass graft (CABG)','Avoidance of caffeine and emotional stress','Long-term bed rest'],
ans:[0,1,2,3],
rat:'Angina management: PHARMACOLOGIC — nitrates (vasodilate coronaries), beta-blockers (reduce O2 demand), calcium channel blockers, statins, aspirin. PROCEDURAL — PCI/PTCA (balloon angioplasty + stenting) for significant stenosis, CABG for multivessel disease. LIFESTYLE — avoid triggers: caffeine (stimulant), emotional stress (catecholamine release), cold, heavy meals. Long-term bed rest is NOT appropriate and worsens cardiovascular fitness.',
src:'Exam 1 Term 3'},

{cat:'Angina Pectoris',type:'sata',
q:'Which lifestyle modifications will the nurse include when educating the patient with angina pectoris? (Select all that apply)',
opts:['Stress management techniques','Smoking cessation','Weight reduction therapy','Increasing alcohol intake for vasodilation','Eliminating all physical activity'],
ans:[0,1,2],
rat:'Angina lifestyle modifications: stress management (reduce catecholamine surges that increase O2 demand), smoking cessation (nicotine causes vasoconstriction and platelet aggregation), and weight reduction (obesity increases cardiac workload). Alcohol does NOT improve angina and should be limited. Regular MODERATE exercise (cardiac rehab) is recommended — not elimination of all activity.',
src:'Exam 1 Term 3'},

{cat:'Angina Pectoris',type:'mc',
q:'The primary purpose of nitroglycerin (NTG) in angina is to:',
opts:['Dissolve existing blood clots in coronary arteries','Increase blood flow to the myocardium by coronary artery vasodilation','Reduce heart rate by 20 bpm','Prevent platelet aggregation'],
ans:[1],
rat:'Nitroglycerin\'s primary mechanism: vasodilation of coronary arteries → increased blood flow and oxygen delivery to the ischemic myocardium. It also dilates veins → decreased preload → reduced cardiac workload. Result: reduced myocardial oxygen demand AND increased supply → pain relief. It does NOT dissolve clots (that\'s tPA) or prevent platelets (that\'s aspirin).',
src:'Exam 1 Term 3'},

// ============================================================
// CAD & MYOCARDIAL INFARCTION
// ============================================================
{cat:'CAD & MI',type:'mc',
q:'Which statement by the nurse accurately describes what coronary artery disease (CAD) is?',
opts:['An autoimmune disorder attacking the heart valves','The principal cause is the presence of fatty cholesterol plaques inside the coronary arteries','A congenital defect of the coronary vessels','Inflammation of the pericardium from viral infection'],
ans:[1],
rat:'CAD is caused by atherosclerosis — fatty cholesterol-laden plaques (atheromas) accumulate inside coronary artery walls, narrowing the lumen and reducing blood flow to the myocardium. Over time, plaques can rupture, triggering thrombus formation → acute MI. Risk factors include smoking, DM, HTN, hyperlipidemia, obesity, family history.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'John, a 56-year-old male, has CAD. His father and elder brother died from atherosclerotic heart disease; his BMI has been >35 for 10 years; he has persistent BP of 140–160 systolic. Which of his identified risk factors are UNCONTROLLABLE?',
opts:['Hypertension','Obesity','Family history','BMI'],
ans:[2],
rat:'Family history (positive first-degree relatives with premature CAD) is a NON-MODIFIABLE risk factor — it cannot be changed. Uncontrollable/non-modifiable: age, gender, family history, ethnicity. Controllable/modifiable: hypertension, obesity, BMI, smoking, DM, hyperlipidemia, sedentary lifestyle, stress. John must focus on modifying his controllable risk factors.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'Which test will DETERMINE THE EXTENT of coronary artery disease in a patient presenting with substernal chest pain, diaphoresis, and dyspnea?',
opts:['Chest X-ray','12-lead ECG','Coronary artery angiogram (cardiac catheterization)','Complete blood count (CBC)'],
ans:[2],
rat:'Coronary artery angiogram (cardiac catheterization) with contrast dye is the GOLD STANDARD for visualizing coronary arteries and quantifying the degree of stenosis/occlusion. It provides direct visualization of the exact location and extent of blockage. ECG and biomarkers detect damage; angiogram determines where and how severe the disease is — and guides intervention (PCI vs CABG).',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'A 60-year-old male patient with on-and-off substernal chest pain radiating to the left arm and jaw, accompanied by diaphoresis and dyspnea, had blood tests ordered. Which results are considered POSITIVE FINDINGS for increased risk for CAD?',
opts:['HDL of 70, Total cholesterol of 180','HDL of 40, Total cholesterol of 240','Troponin I elevated, BNP 50','WBC 12,000, CRP normal'],
ans:[1],
rat:'HDL of 40 mg/dL is LOW (normal: >40 men, >50 women; ideal >60 — cardioprotective). Total cholesterol of 240 mg/dL is HIGH (desirable: <200; borderline high: 200–239; high: ≥240). Low HDL + high total cholesterol = significantly elevated cardiovascular risk. This combination dramatically increases CAD risk.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'The nurse teaches the patient about sublingual nitroglycerin. She instructs him to rest and take 1 tablet sublingually when chest pain occurs. If pain continues, she instructs him to:',
opts:['Call 911 immediately after the first tablet','Repeat the dose of NTG SL for a total of 3 tablets every 5 minutes; if no relief, call 911','Take two tablets at once for severe pain','Wait 30 minutes before the second dose'],
ans:[1],
rat:'Standard NTG protocol: Take 1 SL tablet at onset of pain → rest → if pain persists after 5 min, take 2nd tablet → if pain persists after 5 more min, take 3rd tablet → if still no relief after 3 tablets (15 minutes), call 911 immediately. Pain unrelieved by NTG may indicate MI. Never exceed 3 tablets without emergency intervention.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'sata',
q:'Which treatment options does the nurse anticipate to prevent further risk and progression of CAD? (Select all that apply)',
opts:['Smoking cessation','Diet counseling','Weight management','Complete avoidance of all activity','Increasing red meat intake'],
ans:[0,1,2],
rat:'CAD risk reduction: smoking cessation (reduces vasoconstriction, platelet aggregation, and endothelial damage), dietary counseling (low saturated fat, low cholesterol, heart-healthy diet), and weight management (reduces cardiac workload, BP, and insulin resistance). Physical activity (moderate, supervised) is encouraged. Increasing red meat intake worsens dyslipidemia.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'Direct visualization of coronary arteries revealed 70% occlusion of the LAD. Percutaneous Coronary Intervention (PCI) involves:',
opts:['Open-heart surgery with cardiopulmonary bypass','Inserting a balloon-tipped catheter, inflating the balloon, followed by deployment of a stent','Infusing thrombolytics directly into the coronary artery','Bypassing the blocked artery with a donor vessel'],
ans:[1],
rat:'PCI (Percutaneous Coronary Intervention) / PTCA (Percutaneous Transluminal Coronary Angioplasty): a balloon-tipped catheter is advanced through the arterial system to the coronary stenosis → balloon inflated to compress the plaque → stent deployed to maintain lumen patency. It is minimally invasive (no open-heart surgery) and restores coronary blood flow. Drug-eluting stents reduce restenosis.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'Acute MI is BEST DEFINED as:',
opts:['Temporary myocardial ischemia relieved by rest','Myocardium tissue injury or death resulting from inadequate or absent coronary blood flow','Inflammation of the pericardium from infection','Chronic narrowing of coronary arteries without symptoms'],
ans:[1],
rat:'Acute MI = myocardial cell death (infarction) caused by prolonged ischemia from absent or critically reduced coronary blood flow (usually from thrombus on a ruptured atherosclerotic plaque). Unlike angina (reversible ischemia), MI involves permanent myocardial damage. Necrosis begins within 20–40 minutes of sustained ischemia and is complete by 6 hours.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'During history taking and physical examination on a patient suspected of having an MI, the nurse may find:',
opts:['Slow, regular breathing with no pain','Sweating and crushing chest pain that may radiate to the jaw and left arm','Hypertension with no other symptoms','Only fatigue without any chest discomfort'],
ans:[1],
rat:'Classic MI presentation: crushing/pressure substernal chest pain (often radiating to jaw, left arm, shoulder, or back), diaphoresis (profuse sweating), dyspnea, nausea/vomiting, pallor, anxiety, and a sense of "impending doom." Pain is NOT relieved by NTG or rest. Women, elderly, and diabetics may present atypically with fatigue, dyspnea, or indigestion.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'Which INITIAL diagnostic tests will the nurse anticipate to be ordered for a patient suspected of having an acute MI?',
opts:['CT scan of the chest and MRI','12-lead ECG and cardiac isoenzymes (troponin)','Chest X-ray and urinalysis','Pulmonary function tests and arterial blood gas'],
ans:[1],
rat:'Initial MI workup: 12-lead ECG (identifies STEMI vs NSTEMI — ST elevation, T-wave changes, Q waves) and cardiac biomarkers (troponin I — rises in 3 hrs, peaks 12 hrs, lasts 2 wks; CK-MB). ECG is done FIRST (within 10 minutes of presentation). Additional tests: echocardiogram, chest X-ray, coronary angiogram.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'A patient with acute MI refuses PCI. The cardiologist offers tissue plasminogen activator (t-PA). Which is a TRUE statement about t-PA?',
opts:['It prevents future clot formation permanently','It may cause significant bleeding; it dissolves blood clots','It is safe for everyone with chest pain','It has no effect on existing thrombi'],
ans:[1],
rat:'t-PA (alteplase) is a thrombolytic (clot-busting) agent: it dissolves existing thrombi by converting plasminogen to plasmin → lysis of the fibrin clot → restores coronary blood flow. Major risk: significant bleeding (including intracranial hemorrhage). Contraindications: recent surgery, active bleeding, history of stroke, uncontrolled hypertension.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'Metoprolol 25 mg oral was ordered for a patient with AMI. Metoprolol is indicated for patients with AMI because it:',
opts:['Increases heart rate and cardiac output','Decreases heart rate by depressing SA node firing; decreases BP by promoting vascular smooth muscle relaxation','Dissolves coronary thrombi','Prevents platelet aggregation'],
ans:[1],
rat:'Metoprolol (selective beta-1 blocker) in AMI: (1) Decreases heart rate (SA node depression) → reduces myocardial oxygen demand. (2) Decreases BP (vascular smooth muscle relaxation). (3) Reduces infarct size and risk of ventricular dysrhythmias. (4) Reduces mortality post-MI. Start within first 24 hours of AMI if hemodynamically stable — avoid in cardiogenic shock.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'Besides analgesia, morphine sulfate is also effective in treating MI because it:',
opts:['Dissolves clots in coronary arteries','Promotes rest and relieves anxiety; decreases cardiac workload by reducing BP and afterload','Increases heart rate and contractility','Prevents dysrhythmias by blocking calcium channels'],
ans:[1],
rat:'Morphine in MI (part of MONA): (1) Analgesia — reduces pain → reduces sympathetic activation → less catecholamine surge. (2) Anxiolytic — promotes rest, reduces anxiety. (3) Vasodilator — reduces preload (venodilation) and afterload → decreased cardiac workload → reduced O2 demand. Monitor for hypotension and respiratory depression.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'Coronary Artery Bypass Graft (CABG) surgery helps restore heart blood flow by:',
opts:['Inserting a balloon-tipped catheter and inflating the balloon','Taking blood vessels from the extremities and/or chest to create detours around blocked coronary vessels','Implanting a mechanical heart pump','Infusing thrombolytics through the coronary artery'],
ans:[1],
rat:'CABG uses donor vessels (saphenous vein from leg, internal mammary artery from chest) grafted around the blocked coronary arteries, creating new routes (bypass) for blood flow to the myocardium. Unlike PCI, CABG requires open-heart surgery with cardiopulmonary bypass. Indicated for: multivessel disease, left main disease, failed PCI, DM with multivessel disease.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'sata',
q:'As part of discharge planning after CABG surgery, the nurse expects the patient to be prescribed cardiac rehabilitation. Cardiac rehabilitation includes: (Select all that apply)',
opts:['Lifestyle changes (diet, stress management)','Smoking cessation counseling','Unlimited strenuous exercise immediately','Prescription of herbal weight loss supplements','Supervised progressive exercise program'],
ans:[0,1,4],
rat:'Cardiac rehabilitation post-CABG: (1) Lifestyle modification — heart-healthy diet, stress management, BP control. (2) Smoking cessation — single most impactful risk reduction. (3) Supervised progressive exercise — structured program increasing intensity safely. Goal: 2 miles in <60 min after 12 weeks. NOT: immediate strenuous exercise (risk of dysrhythmia/re-infarction) or unsupervised supplements.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'The nurse is assigned to care for a patient suspected with acute bacterial ENDOCARDITIS. What is the most relevant diagnostic lab test to identify the pathologic cause?',
opts:['Complete blood count (CBC)','Two sets of blood cultures (before antibiotics)','Troponin I level','PT/INR'],
ans:[1],
rat:'Two sets of blood cultures (drawn from different sites, before antibiotic therapy) are the MOST IMPORTANT diagnostic test for infective endocarditis. Blood cultures identify the causative organism and antibiotic sensitivities. Starting antibiotics BEFORE cultures reduces the ability to identify the pathogen. Multiple sets increase sensitivity (some organisms are intermittently bacteremic).',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'The nurse recognizes the need for added instruction when the patient recovering from MI on remote telemetry says:',
opts:['"I can ambulate in the hallway with this device on."','"I always take off the telemetry device when I shower."','"My ECG is monitored by nurses in CCU."','"I can sleep with this device on."'],
ans:[1],
rat:'Remote telemetry patients should NEVER remove the device to shower — doing so creates dangerous monitoring gaps where a fatal dysrhythmia could go undetected. Telemetry devices are designed to be worn continuously. Patients can ambulate, sleep, and perform most ADLs with the device. Proper patient education is essential for telemetry safety.',
src:'Exam 1 Term 3'},

{cat:'CAD & MI',type:'mc',
q:'Aspirin (ASA) has been prescribed for a patient with CAD. Which statement is TRUE about long-term aspirin use in CAD?',
opts:['Usual dose is 325 mg three times daily for anticoagulation','Usual dose is 81 mg taken orally daily; relieves pain and prevents platelet aggregation','ASA replaces the need for all other antiplatelet agents','ASA is only used acutely during MI'],
ans:[1],
rat:'Low-dose aspirin (81 mg/day) is standard long-term therapy for CAD. It irreversibly inhibits COX-1 → reduces thromboxane A2 → prevents platelet aggregation → reduces thrombotic events (MI, stroke). It also has mild analgesic effects. Higher doses (325 mg) used acutely during MI. Long-term aspirin reduces recurrent MI risk by ~25%.',
src:'Exam 1 Term 3'},

// ============================================================
// HEART FAILURE
// ============================================================
{cat:'Heart Failure',type:'sata',
q:'Which are CORRECT statements about congestive heart failure (CHF)? (Select all that apply)',
opts:['The heart is unable to pump adequate amounts of blood','Common signs are caused by congestion in the lungs or venous circulation','CHF only occurs in patients under age 50','CHF is always caused by MI','The heart muscle eventually hypertrophies and dilates'],
ans:[0,1],
rat:'CHF: (1) The heart cannot pump adequate blood to meet the body\'s metabolic needs. (2) Signs result from either pulmonary congestion (left HF: dyspnea, crackles, orthopnea) or systemic venous congestion (right HF: edema, JVD, ascites). CHF occurs at all ages and has multiple causes beyond MI (HTN, valve disease, cardiomyopathy, arrhythmias).',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'sata',
q:'Which diagnostic tests does the nurse anticipate when a patient is being worked up for CHF? (Select all that apply)',
opts:['12-lead ECG to detect dysrhythmias possibly causing CHF','Chest X-ray','Cardiac echo for wall motion studies and ejection fraction','Serum BNP to detect cardiac chamber distention','Lumbar puncture'],
ans:[0,1,2,3],
rat:'CHF workup: (1) 12-lead ECG — identifies dysrhythmias (AFib commonly causes/worsens HF) and LVH. (2) Chest X-ray — shows cardiomegaly, pulmonary vascular congestion, pleural effusion. (3) Echo — visualizes wall motion, calculates EF and cardiac output (EF <40% = systolic HF). (4) BNP — elevated in HF (>100 pg/mL abnormal) from cardiac chamber wall stress. Lumbar puncture is not indicated for HF.',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'Which are TRUE statements about RIGHT-sided heart failure?',
opts:['Dyspnea, orthopnea, and pink frothy sputum','Presence of +3 ankle edema, fluid in the abdominal cavity, and distended neck veins','Central cyanosis and easy fatigability','Pulmonary crackles and hemoptysis'],
ans:[1],
rat:'RIGHT-sided HF = SYSTEMIC venous congestion: peripheral edema (feet, ankles, sacrum), ascites (fluid in abdominal cavity), jugular vein distension (JVD), hepatomegaly, anorexia. LEFT-sided HF = PULMONARY congestion: dyspnea, orthopnea, PND, pulmonary crackles, pink frothy sputum, hemoptysis. Remember: Right = Remote (systemic), Left = Lungs (pulmonary).',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'Which are TRUE statements about LEFT-sided heart failure?',
opts:['Distended jugular veins and ascites','Ankle edema and weight gain','The patient complains of dyspnea, orthopnea, and pink frothy sputum; presence of central cyanosis and easy fatigability','Hepatomegaly and RUQ pain'],
ans:[2],
rat:'LEFT-sided HF causes PULMONARY congestion: dyspnea (exertional → at rest), orthopnea (must sit up to breathe), PND (waking at night gasping), pink frothy sputum (pulmonary edema), pulmonary crackles, central/circumoral cyanosis (from poor oxygenation), fatigue (low cardiac output). JVD and ascites are right-sided HF signs.',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'What does digoxin do?',
opts:['It slows the heart rate and reduces contractility','It strengthens myocardial contractions, dilates coronary arteries/veins, and decreases heart rate by slowing AV node conduction','It only treats arrhythmias without affecting contractility','It acts as a diuretic to reduce fluid overload'],
ans:[1],
rat:'Digoxin (cardiac glycoside) has three key actions: (1) POSITIVE INOTROPE — strengthens myocardial contractions (increases force of systole). (2) NEGATIVE CHRONOTROPE — decreases heart rate by delaying impulse formation at SA node and slowing AV conduction. (3) Coronary vasodilation through smooth muscle relaxation. Used for systolic HF and rate control in AFib. Narrow therapeutic index — monitor levels and signs of toxicity.',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'Lisinopril was added to the medication regimen for heart failure in order to:',
opts:['Increase heart rate and cardiac output','Decrease HR, decrease BP, and reduce workload of the heart','Increase sodium retention','Act as an antiarrhythmic'],
ans:[1],
rat:'Lisinopril (ACE inhibitor) in HF: reduces afterload (peripheral vasodilation → lower BP) and preload (reduces aldosterone → less sodium/water retention) → decreased cardiac workload. It also prevents ventricular remodeling (slows disease progression). ACE inhibitors are first-line for systolic HF and shown to reduce mortality. Monitor for hyperkalemia, cough, and hypotension.',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'Which is the MOST APPROPRIATE nursing diagnosis for a patient during an episode of pulmonary edema?',
opts:['Risk for falls related to weakness','Altered gas exchange, less than the body needs','Impaired skin integrity','Knowledge deficit about medications'],
ans:[1],
rat:'Pulmonary edema fills the alveoli with fluid, critically impairing gas exchange → hypoxia → cyanosis, dyspnea, SpO2 <90%. "Impaired gas exchange" is the PRIORITY nursing diagnosis — airway and oxygenation always take precedence (Maslow\'s: physiological survival needs first). Interventions: HOB elevated, O2, diuretics, morphine, vasodilators.',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'A nurse plans to intervene with a patient\'s complaint of sudden severe sternal chest pain. Which of the following is MOST APPROPRIATE for the nurse to do FIRST?',
opts:['Administer nitroglycerin immediately','Call the physician before any assessment','Evaluate the patient\'s VS, pain level, location, duration, precipitating factors, and radiation','Place the patient in Trendelenburg position'],
ans:[2],
rat:'ASSESSMENT FIRST — before any intervention, the nurse must perform a comprehensive pain assessment (OPQRST: Onset, Provocation, Quality, Radiation, Severity, Time) and vital signs. This determines whether it is angina, MI, PE, aortic dissection, or other cause. Only after assessment can appropriate interventions (NTG, O2, ECG, calling provider) be safely prioritized.',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'A post-PCI patient suddenly becomes diaphoretic, hypotensive, and complains of severe chest pain and SOB. What should the nurse do?',
opts:['Document and monitor for 30 minutes','Inform the RN and physician immediately; anticipate STAT order for ECG','Give the patient additional NTG and wait','Increase IV fluid rate to 500 mL/hr'],
ans:[1],
rat:'Sudden diaphoresis, hypotension, and severe chest pain post-PCI = EMERGENCY — likely acute re-occlusion, stent thrombosis, or cardiac tamponade. The nurse must: immediately notify the RN and physician, anticipate STAT 12-lead ECG, prepare for emergency re-intervention, and monitor vital signs continuously. Time is myocardium — rapid response is essential.',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'Which statement by a client with heart failure may indicate WORSENING HF?',
opts:['"I walk 20 minutes every day without stopping."','"I wake up at night short of breath."','"I lost 2 pounds this week."','"I can climb stairs without stopping."'],
ans:[1],
rat:'Paroxysmal nocturnal dyspnea (PND) — waking at night gasping for air — is a classic sign of WORSENING left-sided heart failure. When lying flat, fluid redistributes from dependent tissues to the pulmonary circulation → pulmonary congestion worsens → dyspnea. Patients may need to sleep on multiple pillows or in a recliner (orthopnea).',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'Which information is MOST IMPORTANT to control fluid overload in a patient with heart failure making dietary changes?',
opts:['Limit protein to 30g daily','Restrict sodium to 1500 mg per day','Increase potassium-rich foods','Eliminate all carbohydrates'],
ans:[1],
rat:'Sodium restriction (1500 mg/day for HF patients) is the most important dietary intervention for fluid overload. Sodium causes water retention — every gram of sodium retains approximately 200 mL of water. Restricting sodium decreases fluid retention, reduces preload, and decreases the work of the failing heart. Daily weight monitoring (1 kg gain = 1 L fluid) is essential.',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'How will the nurse respond to the client who takes furosemide and digoxin and reports that "everything looks yellow"?',
opts:['"This is normal — it means the digoxin is working well."','"I will hold the medication until I consult with your healthcare provider."','"You can continue taking it — the yellow vision goes away on its own."','"Take an extra dose of furosemide to clear this symptom."'],
ans:[1],
rat:'Yellow/green halos or yellow-tinged vision is a CLASSIC SIGN of digoxin toxicity (xanthopsia). Furosemide causes hypokalemia, which increases digoxin toxicity risk (hypokalemia sensitizes the myocardium to digoxin). Action: HOLD digoxin, notify provider, check serum digoxin level and potassium, obtain ECG. Therapeutic digoxin level: 0.5–2.0 ng/mL.',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'Which activity would the nurse expect to cause the GREATEST DISTRESS in a client with heart failure?',
opts:['Sitting up in a chair','Climbing a flight of stairs to the bedroom','Walking to the bathroom','Eating a small meal'],
ans:[1],
rat:'Climbing stairs requires the greatest cardiovascular effort of the options listed — significantly increases myocardial oxygen demand, heart rate, and BP. In HF patients with limited cardiac reserve, stair climbing rapidly exceeds the heart\'s capacity to deliver adequate cardiac output, causing dyspnea, fatigue, and possible decompensation. Stair limitation helps grade HF severity (NYHA classification).',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'Which information is most important to include in the discharge teaching plan for a client taking furosemide, digoxin, and potassium chloride?',
opts:['Take all three medications at the same time','Signs and symptoms of digoxin toxicity','Increase fluid intake to 3L daily','Avoid all potassium-rich foods'],
ans:[1],
rat:'With this medication combination, digoxin toxicity is the priority teaching. Furosemide causes hypokalemia → low potassium sensitizes heart to digoxin toxicity. Potassium chloride supplements this loss. Signs of digoxin toxicity: nausea, anorexia, bradycardia (<60), visual changes (yellow/green halos), dysrhythmias. Potassium-rich foods (bananas, oranges) should be encouraged.',
src:'Exam 1 Term 3'},

{cat:'Heart Failure',type:'mc',
q:'Which client statement indicates understanding of FUROSEMIDE\'s side effects?',
opts:['"I can stop taking it once my swelling is gone."','"I should change my position slowly; I must eat food that contains potassium every day."','"I will double the dose if I\'m not urinating enough."','"I will take it at bedtime for best results."'],
ans:[1],
rat:'Furosemide (Lasix) teaching: (1) "Change position slowly" — prevents orthostatic hypotension from rapid fluid shift. (2) "Eat potassium-rich foods daily" — furosemide is a loop diuretic that wastes potassium (hypokalemia risk → dysrhythmias, digoxin toxicity). Potassium-rich foods: bananas, oranges, potatoes, tomatoes. Take in the morning to prevent nocturia.',
src:'Exam 1 Term 3'},

// ============================================================
// DYSRHYTHMIAS & ECG
// ============================================================
{cat:'Dysrhythmias & ECG',type:'mc',
q:'Identify the parts of the heart\'s conductive system in correct order. Which label belongs to structure #1 (the primary pacemaker)?',
opts:['AV node','Bundle of His','SA node (sinoatrial node)','Purkinje fibers'],
ans:[2],
rat:'The conductive system in order: (1) SA node — primary pacemaker, (2) AV node — secondary pacemaker/delays impulse, (3) Bundle of His — enters ventricular septum, (4) Left and right bundle branches — distribute to ventricles, (5) Purkinje fibers — final distribution to ventricular myocardium. The SA node at 60–100 bpm is the dominant pacemaker.',
src:'Exam 1 Term 3'},

{cat:'Dysrhythmias & ECG',type:'mc',
q:'Identify this rhythm — a completely flat line on the ECG monitor:',
opts:['Atrial fibrillation','Ventricular tachycardia','Asystole','Normal sinus rhythm'],
ans:[2],
img:'asystole',
rat:'Asystole = completely flat ECG line = NO cardiac electrical activity = NO cardiac output = cardiac arrest. Management: CPR immediately, epinephrine, confirm in 2 leads (to rule out fine VFib). Defibrillation is NOT effective for asystole. Asystole carries a very poor prognosis. Causes: severe hypoxia, hyperkalemia, profound acidosis.',
src:'Exam 1 Term 3'},

{cat:'Dysrhythmias & ECG',type:'mc',
q:'Identify this ECG rhythm — irregularly irregular with no distinct P waves:',
opts:['Normal sinus rhythm','Atrial fibrillation','Ventricular fibrillation','Sinus tachycardia'],
ans:[1],
img:'afib',
rat:'Atrial fibrillation (AFib): irregularly irregular rhythm, absent P waves (chaotic atrial activity at 350–600 bpm), variable ventricular rate. Causes: HTN, CAD, valve disease, hyperthyroidism. Complications: stroke (thrombus in LAA). Treatment: rate control (beta-blockers, CCBs, digoxin), rhythm control (amiodarone, cardioversion), anticoagulation (warfarin, INR 2–3).',
src:'Exam 1 Term 3'},

{cat:'Dysrhythmias & ECG',type:'mc',
q:'Identify this ECG rhythm — chaotic, disorganized electrical activity with no identifiable QRS complexes:',
opts:['Atrial fibrillation','Asystole','Ventricular fibrillation','Sinus bradycardia'],
ans:[2],
img:'vfib',
rat:'Ventricular fibrillation (VFib): chaotic, disorganized ventricular electrical activity → NO effective cardiac contractions → NO cardiac output → cardiac arrest. ECG: wavy, irregular baseline with no identifiable P, QRS, or T waves. Treatment: IMMEDIATE UNSYNCHRONIZED DEFIBRILLATION + CPR. VFib is the most common cause of sudden cardiac death.',
src:'Exam 1 Term 3'},

{cat:'Dysrhythmias & ECG',type:'mc',
q:'The cardiac monitor reveals a series of premature ventricular complexes (PVCs). The nurse anticipates the client will receive a prescription for which medication?',
opts:['Furosemide (Lasix)','Amiodarone','Metformin','Warfarin'],
ans:[1],
rat:'Amiodarone (Pacerone) is a class III antiarrhythmic used for ventricular dysrhythmias including PVCs, VTach, and VFib. It stabilizes the cardiac membrane and prolongs repolarization. For PVCs in the setting of MI or hemodynamic instability, amiodarone is the drug of choice. Lidocaine is an alternative. Treat underlying cause (hypokalemia, ischemia).',
src:'Exam 1 Term 3'},

{cat:'Dysrhythmias & ECG',type:'mc',
q:'A client is admitted with multiple cardiac signs and symptoms. Which clinical finding alerts the nurse that the primary HCP will probably insert a PACEMAKER?',
opts:['Atrial fibrillation with rapid ventricular rate','Heart block','Sinus tachycardia','Elevated troponin'],
ans:[1],
rat:'Heart block (AV block) — especially complete (3rd-degree) or symptomatic 2nd-degree AV block — is the primary indication for permanent pacemaker insertion. In complete heart block, no impulses conduct from atria to ventricles → dangerously slow ventricular escape rhythm (20–40 bpm) → syncope, hemodynamic compromise. Pacemakers provide reliable rate support.',
src:'Exam 1 Term 3'},

{cat:'Dysrhythmias & ECG',type:'mc',
q:'Which action would the nurse take for a patient with a NEW pacemaker?',
opts:['Encourage full ambulation immediately','Enforce bed rest for the first 24 hours','Discharge within 6 hours','Begin cardiac rehab on day 1'],
ans:[1],
rat:'Post-pacemaker insertion (transvenous lead placement): enforce bed rest for first 24 hours to prevent lead displacement (leads are not yet anchored by tissue ingrowth). Activity restrictions: avoid raising affected arm above shoulder for 2–4 weeks. Monitor for complications: lead displacement, pneumothorax, pacemaker infection, hematoma at insertion site. Obtain post-procedure chest X-ray to confirm lead position.',
src:'Exam 1 Term 3'},

{cat:'Dysrhythmias & ECG',type:'mc',
q:'Which response will the nurse provide to the client with a dysrhythmia who is requesting coffee?',
opts:['"Coffee is fine in moderation — one cup per day is acceptable."','"Coffee has caffeine which can affect your heart — it should be avoided."','"Coffee only affects blood pressure, not heart rhythm."','"Decaffeinated coffee is the same risk as regular coffee."'],
ans:[1],
rat:'Caffeine is a stimulant that increases heart rate and can trigger or worsen dysrhythmias. Caffeine blocks adenosine receptors → sympathomimetic effects → increased catecholamine release → increased automaticity → can precipitate atrial or ventricular dysrhythmias. Patients with dysrhythmias should avoid or strictly limit caffeine (coffee, tea, energy drinks, chocolate).',
src:'Exam 1 Term 3'},

{cat:'Dysrhythmias & ECG',type:'mc',
q:'Which ECG rhythm is seen here? (Regular rhythm, P wave before every QRS, rate ~120 bpm)',
opts:['Atrial fibrillation','Sinus bradycardia','Sinus tachycardia','Ventricular tachycardia'],
ans:[2],
img:'stach',
rat:'Sinus tachycardia: regular rhythm, P wave before every QRS, HR >100 bpm (here ~120). All components in correct order — just running fast. Treat the UNDERLYING CAUSE: fever, pain, hypovolemia, anxiety, anemia, hyperthyroidism, medications. Beta-blockers may be used if rate control is needed. This is NOT VTach — VTach has wide QRS and no P waves.',
src:'Exam 1 Term 3'},

// ============================================================
// PHARMACOLOGY
// ============================================================
{cat:'Pharmacology',type:'mc',
q:'Which laboratory result would be of CONCERN to the nurse for a client receiving digoxin therapy for cardiomyopathy?',
opts:['Sodium 140 mEq/L','Potassium 2.8 mEq/L (hypokalemia)','Hemoglobin 14 g/dL','Calcium 9.5 mg/dL'],
ans:[1],
rat:'Hypokalemia (K+ <3.5 mEq/L) is a critical concern for digoxin patients. Low potassium sensitizes the myocardium to digoxin toxicity — even at "therapeutic" digoxin levels, hypokalemia can precipitate life-threatening dysrhythmias (VFib, VTach). Loop diuretics (furosemide) commonly cause hypokalemia in HF patients. Always check K+ before giving digoxin.',
src:'Exam 1 Term 3'},

{cat:'Pharmacology',type:'mc',
q:'Which assessment would the nurse perform BEFORE administering digoxin?',
opts:['Blood pressure only','Respiratory rate','Apical heart rate for one full minute','Temperature'],
ans:[2],
rat:'Before every digoxin dose: take the APICAL PULSE for a FULL MINUTE. If HR <60 bpm (bradycardia) → HOLD the dose and notify the provider. Digoxin slows AV conduction and can worsen bradycardia. Also assess for signs of toxicity (nausea, visual changes). Check potassium level as well — hypokalemia increases toxicity risk.',
src:'Exam 1 Term 3'},

{cat:'Pharmacology',type:'mc',
q:'Which treatment would the nurse expect for a client admitted with fever, chills, night sweats, fatigue, weight loss, and a NEW mitral heart murmur 2 weeks after dental surgery?',
opts:['Oral antibiotics for 5 days','Intravenous (IV) antibiotics (typically 4–6 weeks)','Immediate heart valve surgery','Corticosteroid therapy'],
ans:[1],
rat:'This presentation = infective endocarditis (fever, constitutional symptoms, new murmur, temporal relationship to dental procedure — bacteremia seeded the valves). Treatment: prolonged IV antibiotics (4–6 weeks) based on blood culture results and organism. IV delivery maintains sustained bactericidal levels needed to penetrate the vegetation. Prevention: prophylactic antibiotics before high-risk dental procedures in susceptible patients.',
src:'Exam 1 Term 3'},

{cat:'Pharmacology',type:'mc',
q:'Which is the most beneficial intervention for a client with Strep viridans infection of a heart valve, persistent temp of 104°F, chills, and severe fatigue?',
opts:['Advising the client to start complete bed rest','Immediately beginning IV antibiotics','Performing emergency valve replacement surgery','Administering antipyretics only'],
ans:[0],
rat:'While IV antibiotics are the definitive treatment, complete bed rest is the MOST BENEFICIAL IMMEDIATE NURSING INTERVENTION to conserve energy, reduce cardiac workload (fever dramatically increases O2 demand), and prevent complications. Bed rest during the acute febrile phase is essential while antibiotics address the underlying infection. Note: in clinical practice, IV antibiotics are initiated simultaneously.',
src:'Exam 1 Term 3'},

{cat:'Pharmacology',type:'mc',
q:'Which condition causes inflammation of the membranes of the sac surrounding the heart muscle, with aches, fatigue, and dyspnea?',
opts:['Myocarditis','Endocarditis','Pericarditis','Cardiomyopathy'],
ans:[2],
rat:'Pericarditis = inflammation of the PERICARDIUM (the fibrous sac surrounding the heart). Causes: viral infection (most common), bacterial, post-MI (Dressler syndrome), autoimmune. Hallmark: sharp retrosternal chest pain WORSE when lying flat, IMPROVED by leaning forward; pericardial friction rub on auscultation. ESR elevated. Treatment: NSAIDs, colchicine, rest.',
src:'Exam 1 Term 3'},

// ============================================================
// INFLAMMATORY & VALVULAR
// ============================================================
{cat:'Inflammatory & Valvular',type:'mc',
q:'A patient with a new pacemaker for AFib correction is asking about future testing. Which diagnostic test is NO LONGER available because of the implanted pacemaker?',
opts:['CT scan','MRI (Magnetic Resonance Imaging)','PET scan','Thallium scan'],
ans:[1],
rat:'MRI is contraindicated with most older pacemakers because the strong magnetic fields can reset the pacemaker to a fixed rate or interfere with/damage the device. Newer MRI-conditional pacemakers exist and can be used under specific protocols. Always check pacemaker manufacturer\'s specifications before any imaging. CT, PET, and thallium scans are generally safe with pacemakers.',
src:'Exam 1 Term 3'},

// ============================================================
// LOSS & GRIEF
// ============================================================
{cat:'Loss & Grief',type:'mc',
q:'Which of the following would lead the home health nurse to identify a nursing problem of "unresolved grief" for a patient widowed 5 months ago?',
opts:['The patient has resumed working part-time','The patient says tearfully, "I can\'t believe he\'s gone."','The patient has joined a grief support group','The patient is sleeping 7–8 hours per night'],
ans:[1],
rat:'Saying "I can\'t believe he\'s gone" tearfully at 5 months post-loss suggests DENIAL or inability to accept the reality of the death — a sign of unresolved/complicated grief. Normal grief involves progression through acceptance. Warning signs of complicated grief: persistent denial, inability to function, social isolation, prolonged inability to accept the loss. Referral to grief counseling may be needed.',
src:'Exam 1 Term 3'},

{cat:'Loss & Grief',type:'mc',
q:'Following the death of a day-old infant, the nurse brings the baby to the parents. What is the RATIONALE for the parents\' visit with their deceased baby?',
opts:['To allow the nurse time to document','Make the death a reality — facilitate the grief process','Required by hospital policy','To take final photographs only'],
ans:[1],
rat:'Allowing parents to hold and see their deceased infant makes the death real and tangible — this facilitates the grief process by preventing denial. Parents who do not see their baby may struggle to accept the death. This is a therapeutic nursing intervention aligned with evidence-based bereavement care. It also allows for meaningful goodbye moments and memory-making.',
src:'Exam 1 Term 3'},

{cat:'Loss & Grief',type:'mc',
q:'After a 2-year-old is pronounced dead following a pool accident, the mother tearfully says to the father, "I am sorry, I am so sorry." What is the mother expressing?',
opts:['Anger','Depression','Guilt','Bargaining'],
ans:[2],
rat:'The mother is expressing GUILT — a common response when a parent believes they could have prevented the death. "I am sorry" suggests self-blame. Guilt is particularly common in: accidental deaths, suicides, and deaths where the survivor had caregiving responsibility. Nursing response: normalize the feeling, avoid reinforcing self-blame, refer to counseling, provide supportive presence.',
src:'Exam 1 Term 3'},

{cat:'Loss & Grief',type:'mc',
q:'What are the drugs of choice when caring for the HOSPICE patient?',
opts:['Antibiotics and chemotherapy','Morphine derivatives (opioids)','NSAIDs only','Benzodiazepines for sleep only'],
ans:[1],
rat:'Morphine derivatives (opioids: morphine sulfate, hydromorphone, oxycodone) are the drugs of choice in hospice/palliative care for pain management and relief of dyspnea. The philosophy of hospice is COMFORT CARE — not curative treatment. Adequate opioid dosing is ethical and legal (principle of double effect). Comfort > quantity of life. Also used: anti-anxiety agents, anti-nausea medications.',
src:'Exam 1 Term 3'},

// ============================================================
// PATIENT TEACHING
// ============================================================
{cat:'Patient Teaching',type:'mc',
q:'After CABG surgery that used donor vessels from the internal mammary and saphenous veins, the nurse monitors the patient for signs of infection. These signs include:',
opts:['Decreased temperature and blood pressure','All signs: redness, warmth, swelling, purulent drainage, and fever','Only wound drainage','Only elevated WBC count'],
ans:[1],
rat:'Post-CABG infection signs (ALL of the classic signs of infection): redness (rubor), warmth (calor), swelling (tumor), pain (dolor), purulent drainage, fever (>38°C/100.4°F), elevated WBC (leukocytosis), and poor wound healing. Mediastinitis (deep sternal wound infection) is a serious CABG complication requiring immediate treatment. Monitor both sternal and leg incision sites.',
src:'Exam 1 Term 3'},

{cat:'Patient Teaching',type:'mc',
q:'A patient with a new pacemaker asks what activity restrictions apply. Which action would the nurse take regarding a NEW pacemaker?',
opts:['Encourage full range of motion of affected arm immediately','Enforce bed rest for the first 24 hours and then gradually increase activity','Begin jogging the next day','Apply ice to pacemaker site continuously'],
ans:[1],
rat:'New pacemaker post-insertion care: (1) Bed rest first 24 hours — prevents lead displacement before tissue ingrowth anchors leads. (2) Gradual activity increase. (3) Avoid raising affected arm above shoulder level for 2–4 weeks. (4) Teach about avoiding MRI, large magnets, some electrical equipment. (5) Wear medical ID. (6) Know pacemaker rate settings. Monitor for complications.',
src:'Classroom Notes'}];
